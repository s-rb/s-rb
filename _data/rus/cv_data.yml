    position: "Ведущий разработчик"
    description:
      - "Ситуация: Вступил в действие закон, согласно которому вся биометрия должна храниться в Единой Биометрической Системе"
      - "Задача: Выгрузить собранную биометрию в ЕБС, получить вектора в ЕБС и перенастроить все системы Банка на работу с этими векторами"
      - "Действие: В установленный срок разработал новый сервис и доработал существующие, позволившие выполнить эти действия и перевести существующие системы на биометрию из ЕБС"
      - "Результат: Банк сохранил лицензию и избежал многомиллионных штрафов, система перешла на новый этап развития"
      - "Навыки: Разработка микросервисов, Java 11, SpringBoot 2, асинхронность и джобы, NoSQL, MongoDB, Docker и Kubernetes, скрипты на Python и др"
      - " "
      - "Ситуация: В системе: устаревший стэк, не настроен процесс CI/CD (сборки вручную), отсутствует покрытие тестами, долгие запросы в БД (до 2 с), множество AppSec уязвимостей"
      - "Задача: Обеспечить покрытие тестами, настроить CI/CD, ускорить запросы в БД, обновить основные компоненты"
      - "Действие: Микросервисы переведены на современный стэк Java 17, SpringBoot 3 и др, настроен в Jenkins CI/CD процесс, покрытие тестами до 80%, добавлены индексы для ускорения запросов, устранены уязвимости"
      - "Результат: Увеличилось качество с покрытием тестами и устранением уязвимостей системы, процесс CI/CD переведен на Jenkins, запросы перестали превышать 100мс, современный стэк облегчает поддержку и использование современных функций"
      - "Навыки: Java 17, SpringBoot 3, CI/CD, Jenkins, JUnit, Mockito, FluentBit"
      - " "
      - "Дополнительно выполнял функции командного Scrum мастера, обеспечивал фасилитацию процессов, организовывал все мероприятия, фокусировал команду на целях, помогал в самоорганизации, проводил ретро для улучшения процессов"

