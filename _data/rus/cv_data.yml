name: Роман Сурков
job-title: Senior Java Developer
description:
  - "Опытный и результативный Java-разработчик с подтвержденной историей разработки высококачественных программных решений. 
  Работал с основными современными фреймворками и технологиями. 
  Свыше 5 лет опыта разработки и внедрения сложных проектов в различных отраслях, включая Финтех отрасль."
  - "На протяжении всей карьеры демонстрировал страсть к разработке программного обеспечения и стремление к постоянному 
  обучению и росту. Успешно сотрудничал с другими командами для оптимизации процесса разработки и улучшения качества. 
  Имею опыт в управлении командой, успешно управлял и наставлял младших разработчиков, способствуя совместной 
  продуктивной рабочей среде."
  - "Мной движет желание решать сложные проблемы и я прекрасно себя чувствую в динамичной среде, где могу использовать 
  свои навыки решения проблем и внимание к деталям. С фокусом на создание отличных результатов, я нацелен превзойти 
  ожидания клиентов и обеспечить успех бизнеса."
  - "Я ищу новую возможность, где я могу использовать свой опыт и навыки для вклада в успех перспективной компании."

